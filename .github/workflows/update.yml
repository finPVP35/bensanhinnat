name: Update Fuel Prices
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
concurrency:
  group: update-fuel-prices
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run update script
        run: node update.js
      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data.json
          git commit -m "Update fuel prices" || echo "No changes"
          git push
